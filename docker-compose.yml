services:
  joplin-mcp:
    build: .
    container_name: joplin-mcp-server
    ports:
      - '127.0.0.1:${JOPLIN_DATA_API_PORT:-41100}:${JOPLIN_DATA_API_PORT:-41100}'
    expose:
      - '${JOPLIN_DATA_API_PORT:-41100}'
    env_file:
      - .env
    environment:
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - joplin_data:/home/joplin/.config/joplin
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${JOPLIN_DATA_API_PORT:-41100}/ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    init: true

volumes:
  joplin_data:
