services:
  joplin-mcp:
    build: .
    image: joplin-api-mcp
    container_name: joplin-mcp-server
    ports:
      # Host port 41184 → container proxy port 41185 (socat 0.0.0.0:41185 → 127.0.0.1:41184)
      - '127.0.0.1:${JOPLIN_DATA_API_PORT:-41184}:41185'
    expose:
      - '41185'
    env_file:
      - .env
    environment:
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - joplin_data:/home/joplin/.config/joplin
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:41185/ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    init: true

  test:
    build:
      context: .
      dockerfile: Dockerfile.tests
    image: joplin-api-tests:latest
    volumes:
      - ./reports:/app/reports

volumes:
  joplin_data:
