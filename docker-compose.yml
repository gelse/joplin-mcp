services:
  # ===========================================================================
  # Container A — joplin-core: Joplin CLI + Data API + periodic sync
  # ===========================================================================
  joplin-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    image: joplin-api-core
    container_name: joplin-core
    env_file:
      - .env
    environment:
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - joplin_data:/home/joplin/.config/joplin
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:41184/ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    init: true

  # ===========================================================================
  # Container B — joplin-mcp: Stateless MCP HTTP server
  # ===========================================================================
  joplin-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: joplin-api-mcp
    container_name: joplin-mcp-server
    ports:
      # Expose MCP HTTP server on localhost only
      - '127.0.0.1:${MCP_PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      - JOPLIN_CORE_URL=http://joplin-core:41184
      - JOPLIN_API_TOKEN=${JOPLIN_API_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      joplin-core:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    init: true

  # ===========================================================================
  # Test runner (unchanged)
  # ===========================================================================
  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.tests
    image: joplin-api-tests:latest
    volumes:
      - ./reports:/app/reports

volumes:
  joplin_data:
